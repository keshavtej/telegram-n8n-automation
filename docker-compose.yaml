version: "3.8"

volumes:
  n8n_data:

services:
  n8n:
    image: docker.n8n.io/n8n/n8n:latest
    container_name: n8n-telegram-bot
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      # Setting this ensures the AI node understands "tomorrow at 5pm" accurately
      - GENERIC_TIMEZONE=Asia/Kolkata 
    volumes:
      - n8n_data:/home/node/.n8n
    env_file:
      - .env